<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:url("anhcuoi.jpg") no-repeat center center fixed;
  background-size:cover;
  color:#b30059;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(5px);
  z-index:-1;
}

/* COVER */
.cover{
  position:fixed;
  width:100%;
  height:100vh;
  background:linear-gradient(135deg,#ffb3d9,#ff66a3);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  color:white;
  text-align:center;
  overflow:hidden;
}

.open-btn{
  padding:14px 35px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3385;
  cursor:pointer;
}

/* FIREWORK */
.firework{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:10000;
  animation: explode 1s ease-out forwards;
}

@keyframes explode{
  from{
    transform:scale(1);
    opacity:1;
  }
  to{
    transform:scale(8);
    opacity:0;
  }
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.content{
  max-width:500px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:20px;
  text-align:center;
}

h1{
  font-family:'Playfair Display', serif;
  color:#e60073;
}

.names{
  font-family:'Great Vibes', cursive;
  font-size:50px;
  margin:15px 0;
  color:#e60073;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #ff99cc;}
  to{ text-shadow:0 0 20px #ff3385;}
}

.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.box{
  background:white;
  padding:10px;
  border-radius:10px;
}

/* FALL EFFECT */
.effect{
  position:fixed;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="cover" id="cover">
  <h2>Thiệp cưới</h2>
  <p>Hưng ❤️ Quỳnh</p>
  <br>
  <button class="open-btn" onclick="openInvitation()">Mở Thiệp</button>
</div>

<section class="hero">
  <div class="content">
    <h1>We Are <br> Getting Married</h1>
    <div class="names">Hưng ❤️ Quỳnh</div>
    <div>20 • 12 • 2028</div>

    <div class="countdown">
      <div class="box"><span id="d"></span><br>Ngày</div>
      <div class="box"><span id="h"></span><br>Giờ</div>
      <div class="box"><span id="m"></span><br>Phút</div>
      <div class="box"><span id="s"></span><br>Giây</div>
    </div>
  </div>
</section>

<script>
/* COUNTDOWN */
const date = new Date("Dec 20, 2028 11:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const diff = date - now;

  document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerHTML = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerHTML = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerHTML = Math.floor((diff%(1000*60))/1000);
},1000);

/* HOA + TIM */
function create(symbol){
  const el = document.createElement("div");
  el.classList.add("effect");
  el.innerHTML = symbol;
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (14+Math.random()*20)+"px";
  el.style.animationDuration = (5+Math.random()*5)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),10000);
}
setInterval(()=>create("🌸"),800);
setInterval(()=>create("❤️"),1200);

/* FIREWORK XỊN */
let fireworkInterval;

function createFirework(){
  const container = document.getElementById("cover");

  // bay lên
  const rocket = document.createElement("div");
  rocket.style.position="absolute";
  rocket.style.width="3px";
  rocket.style.height="10px";
  rocket.style.background="#fff";
  rocket.style.left=Math.random()*100+"%";
  rocket.style.bottom="0";
  rocket.style.transition="1s linear";

  container.appendChild(rocket);

  setTimeout(()=>{
    rocket.style.bottom="70%";
  },50);

  // nổ
  setTimeout(()=>{
    rocket.remove();

    for(let i=0;i<20;i++){
      const fw = document.createElement("div");
      fw.classList.add("firework");

      const size = 3 + Math.random()*5;
      fw.style.width = size+"px";
      fw.style.height = size+"px";

      const colors = ["#ff66a3","#ff3385","#ff99cc","#ffffff"];
      fw.style.background = colors[Math.floor(Math.random()*colors.length)];

      fw.style.left = rocket.style.left;
      fw.style.top = "30%";

      container.appendChild(fw);

      setTimeout(()=>fw.remove(),1000);
    }
  },1000);
}

fireworkInterval = setInterval(createFirework, 800);

/* OPEN */
function openInvitation(){
  document.getElementById("cover").style.display="none";
  clearInterval(fireworkInterval);
}
</script>

</body>
</html>
