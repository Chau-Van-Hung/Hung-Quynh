<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:url("anhcuoi.jpg") no-repeat center center fixed;
  background-size:cover;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(5px);
  z-index:-1;
}

/* COVER */
.cover{
  position:fixed;
  width:100%;
  height:100vh;
  background:linear-gradient(135deg,#ffb3d9,#ff66a3);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  color:white;
  overflow:hidden;
}

.open-btn{
  padding:14px 35px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff3385;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.content{
  background:rgba(255,255,255,0.7);
  padding:40px;
  border-radius:20px;
  text-align:center;
}

.names{
  font-family:'Great Vibes', cursive;
  font-size:50px;
  color:#e60073;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #ff99cc;}
  to{ text-shadow:0 0 25px #ff3385;}
}

/* COUNTDOWN */
.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.box{
  background:white;
  padding:10px;
  border-radius:10px;
}

/* HIỆU ỨNG BAY */
.effect{
  position:fixed;
  pointer-events:none;
  animation: float linear forwards;
}

@keyframes float{
  0%{
    transform:translateY(0) translateX(0) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(-120vh) translateX(100px) rotate(360deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="cover" id="cover">
  <h2>Thiệp cưới</h2>
  <p>Hưng ❤️ Quỳnh</p>
  <br>
  <button class="open-btn" onclick="openInvitation()">Mở Thiệp</button>
</div>

<section class="hero">
  <div class="content">
    <h1>We Are <br> Getting Married</h1>
    <div class="names">Hưng ❤️ Quỳnh</div>
    <div>20 • 12 • 2028</div>

    <div class="countdown">
      <div class="box"><span id="d"></span><br>Ngày</div>
      <div class="box"><span id="h"></span><br>Giờ</div>
      <div class="box"><span id="m"></span><br>Phút</div>
      <div class="box"><span id="s"></span><br>Giây</div>
    </div>
  </div>
</section>

<script>
/* COUNTDOWN */
const date = new Date("Dec 20, 2028 11:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const diff = date - now;

  document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerHTML = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerHTML = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerHTML = Math.floor((diff%(1000*60))/1000);
},1000);

/* HIỆU ỨNG HOA + TIM + BONG BÓNG */
function createEffect(){
  const el = document.createElement("div");
  el.classList.add("effect");

  const items = ["🌸","🌺","💖","❤️","🎈"];
  el.innerHTML = items[Math.floor(Math.random()*items.length)];

  el.style.left = Math.random()*100 + "vw";
  el.style.bottom = "-20px";

  el.style.fontSize = (16 + Math.random()*20) + "px";

  el.style.animationDuration = (6 + Math.random()*5) + "s";

  document.body.appendChild(el);

  setTimeout(()=>el.remove(),10000);
}

setInterval(createEffect, 300);

/* OPEN */
function openInvitation(){
  document.getElementById("cover").style.display="none";
}
</script>

</body>
</html>
